    <path d="M 40 360 &#xA;             Q 60 280 140 260 &#xA;             L 260 220 &#xA;             Q 340 180 480 170 &#xA;             L 700 170 &#xA;             Q 840 180 900 210 &#xA;             L 990 260 &#xA;             Q 1050 280 1060 340 &#xA;             L 1060 400 &#xA;             Q 1060 420 1040 420 &#xA;             L 60 420 &#xA;             Q 40 420 40 400 &#xA;             Z" fill="url(#body)"></path>

    
    <path d="M 280 220 L 460 180 L 720 180 L 860 220 L 820 240 L 480 220 Z" fill="#1f1f1f" opacity="0.9"></path>

    
