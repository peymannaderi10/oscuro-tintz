<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0.9"></stop>
      <stop offset="45%" stop-color="#0e0e0e" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#000" stop-opacity="1"></stop>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000"></stop>
      <stop offset="100%" stop-color="#0a0a0a"></stop>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"></stop>
      <stop offset="50%" stop-color="#050505"></stop>
      <stop offset="100%" stop-color="#0f0f0f"></stop>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
