      <stop offset="40%" stop-color="#eee" stop-opacity="0.3"></stop>
      <stop offset="100%" stop-color="#000" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  
  <rect width="1920" height="1080" fill="url(#glow)"></rect>

  
  <rect y="720" width="1920" height="360" fill="url(#floor)"></rect>

  
  <ellipse cx="960" cy="780" rx="900" ry="40" fill="#1a1a1a" opacity="0.6"></ellipse>

  
  <g transform="translate(420 360)">
    
