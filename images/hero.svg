    <path d="M 290 230 L 470 195 L 710 195 L 830 230" stroke="#2a2a2a" stroke-width="1" fill="none"></path>

    
    <path d="M 320 285 L 820 285 L 800 340 L 340 340 Z" fill="url(#glass)" opacity="0.85"></path>

    
    <path d="M 60 360 L 1050 360" stroke="url(#highlight)" stroke-width="1" opacity="0.5"></path>
    <path d="M 120 300 Q 550 310 990 300" stroke="#2a2a2a" stroke-width="1" fill="none" opacity="0.6"></path>

    
    <g>
