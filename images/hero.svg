      <stop offset="100%" stop-color="#181818"></stop>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="headlight" cx="50%" cy="50%" r="50%">
