<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"></stop>
      <stop offset="100%" stop-color="#050505"></stop>
    </linearGradient>
    <radialGradient id="aspot" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a2a"></stop>
      <stop offset="100%" stop-color="#000"></stop>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#aspot)"></rect>

  
  <g transform="translate(180 180)">
    
    <ellipse cx="220" cy="260" rx="180" ry="40" fill="#0a0a0a"></ellipse>
    <rect x="40" y="260" width="360" height="340" fill="url(#ag)"></rect>
    <ellipse cx="220" cy="600" rx="180" ry="40" fill="#030303"></ellipse>

    
    <ellipse cx="220" cy="258" rx="180" ry="40" fill="#333" opacity="0.6"></ellipse>
    <ellipse cx="220" cy="258" rx="140" ry="30" fill="#1a1a1a"></ellipse>
    <ellipse cx="220" cy="258" rx="90" ry="18" fill="#0a0a0a"></ellipse>

    
    <circle cx="220" cy="258" r="30" fill="#2a2a2a"></circle>
    <circle cx="220" cy="258" r="18" fill="#0a0a0a"></circle>

    
    <rect x="40" y="260" width="6" height="340" fill="#fff" opacity="0.08"></rect>
    <rect x="394" y="260" width="6" height="340" fill="#fff" opacity="0.05"></rect>
  </g>

  
  <rect x="0" y="820" width="800" height="180" fill="#000"></rect>
  <ellipse cx="400" cy="820" rx="300" ry="20" fill="#1a1a1a" opacity="0.5"></ellipse>

  <rect width="800" height="1000" fill="#000" opacity="0.08"></rect>
